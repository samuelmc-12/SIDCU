<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIDCU — Comparador de Carreras (Sin JavaScript)</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/footer.css" />
  <link rel="stylesheet" href="./css/comparador.css" />
</head>
<body>
  <!-- HEADER -->
    <header>
        <nav class="navbar">
            <h1 class="logo">
                <a href="./index.html" class="linksidcu"><span class="bold">SID</span><span class="purple">CU</span></a>
            </h1>
            <ul class="nav-links">
                <li><a href="./nosotros.html">Nosotros</a></li>
                <li><a href="./colaboradores.html">Colaboradores</a></li>
                <li><a href="./carreras.html">Carreras</a></li>
                <li><a href="./comparador.html">Comparador</a></li>
                <li><a href="./test.html">Test Vocacional</a></li>
            </ul>
        </nav>
    </header>

  <main class="comparador-main">
    <section class="comparador-intro">
      <h1>Comparador de Carreras</h1>
      <p>
        Selecciona hasta tres carreras en los menús desplegables.
      </p>
    </section>

    <section class="comparador-controls" aria-label="Seleccionar carreras para comparar">
      <form class="comparador-form" action="#" method="get" novalidate>
        <div class="selector-row">
          <div class="selector-group">
            <label for="selectA">Carrera A</label>
            <select id="selectA" name="carreraA" aria-label="Seleccionar carrera A">
              <option value="">-- Seleccionar carrera --</option>
              <option value="sis">Ingeniería de Sistemas — Ingeniería</option>
              <option value="med">Medicina — Salud</option>
              <option value="eco">Economía — Economía y Negocios</option>
              <option value="psic">Psicología — Ciencias Sociales</option>
              <option value="dis">Diseño Gráfico — Arte y Diseño</option>
              <option value="civ">Ingeniería Civil — Ingeniería</option>
              <option value="edu">Licenciatura en Educación — Educación</option>
            </select>
          </div>

          <div class="selector-group">
            <label for="selectB">Carrera B</label>
            <select id="selectB" name="carreraB" aria-label="Seleccionar carrera B">
              <option value="">-- Seleccionar carrera --</option>
              <option value="sis">Ingeniería de Sistemas — Ingeniería</option>
              <option value="med">Medicina — Salud</option>
              <option value="eco">Economía — Economía y Negocios</option>
              <option value="psic">Psicología — Ciencias Sociales</option>
              <option value="dis">Diseño Gráfico — Arte y Diseño</option>
              <option value="civ">Ingeniería Civil — Ingeniería</option>
              <option value="edu">Licenciatura en Educación — Educación</option>
            </select>
          </div>

          <div class="selector-group">
            <label for="selectC">Carrera C (opcional)</label>
            <select id="selectC" name="carreraC" aria-label="Seleccionar carrera C">
              <option value="">-- Seleccionar carrera --</option>
              <option value="sis">Ingeniería de Sistemas — Ingeniería</option>
              <option value="med">Medicina — Salud</option>
              <option value="eco">Economía — Economía y Negocios</option>
              <option value="psic">Psicología — Ciencias Sociales</option>
              <option value="dis">Diseño Gráfico — Arte y Diseño</option>
              <option value="civ">Ingeniería Civil — Ingeniería</option>
              <option value="edu">Licenciatura en Educación — Educación</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="comparar-button">Comparar</button>
            <button type="reset" class="reset-button">Restablecer</button>
        </div>


      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-container">
      <p>&copy; SIDCU - Simulador De Carreras Universitarias</p>
      <div class="footer-links">
        <a href="#">Política de privacidad</a>
        <span>|</span>
        <a href="#">Términos de uso</a>
        <span>|</span>
        <a href="#">Contacto</a>
      </div>
    </div>
  </footer>
  <script src="js/comparador.js"></script>
</body>
</html>

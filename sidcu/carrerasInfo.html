<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Carrera - SIDCU</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/carrerasInfo.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav class="navbar">
            <h1 class="logo">
                <a href="./index.html" class="linksidcu">
                    <span class="bold">SID</span><span class="purple">CU</span>
                </a>
            </h1>

            <ul class="nav-links">
                <li><a href="./nosotros.html">Nosotros</a></li>
                <li><a href="./colaboradores.html">Colaboradores</a></li>
                <li><a href="./carreras.html">Carreras</a></li>
                <li><a href="./comparador.html">Comparador</a></li>
                <li><a href="./test.html">Test Vocacional</a></li>
            </ul>
        </nav>
    </header>

    <main class="info-main">

        <section class="info-container">

            <img id="imagenCarrera" src="" alt="Carrera">

            <div class="info-texto">

                <h1 id="nombreCarrera"></h1>

                <span id="categoriaCarrera" class="categoria"></span>

                <p id="descripcionCarrera"></p>

                <div class="info-grid">

                    <div class="info-card">
                        <h3>Duración</h3>
                        <p id="duracionCarrera"></p>
                    </div>

                    <div class="info-card">
                        <h3>Costo aproximado</h3>
                        <p id="costoCarrera"></p>
                    </div>

                    <div class="info-card">
                        <h3>Salario promedio</h3>
                        <p id="salarioCarrera"></p>
                    </div>

                    <div class="info-card">
                        <h3>Ocupabilidad</h3>
                        <p id="ocupabilidadCarrera"></p>
                    </div>

                </div>

                <div class="habilidades">
                    <h2>Habilidades necesarias</h2>
                    <div id="habilidadesLista"></div>
                </div>

                <div class="campo-laboral">
                    <h2>Campo laboral</h2>
                    <p id="campoLaboral"></p>
                </div>

                <div class="universidades">
                    <h2>Universidades recomendadas</h2>
                    <ul id="universidadesLista"></ul>
                </div>

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; SIDCU - Simulador De Carreras Universitarias</p>
        </div>
    </footer>

    <script src="js/carrerasInfo.js"></script>

</body>
</html>
